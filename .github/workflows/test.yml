name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Swift Test on macOS
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: QuotaMonitor-binary
          path: .build/release/QuotaMonitor
          retention-days: 7
